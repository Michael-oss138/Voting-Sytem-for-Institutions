{% extends 'base.html' %}
{% load static %}
{% block title %}Election — CrawfordVote{% endblock %}

{% block content %}
<div class="mb-3">
  <a href="/elections-page/" class="text-sm text-muted" style="text-decoration:none;">← Back to Elections</a>
</div>

<div id="alert" class="alert"></div>
<div id="page-out"><div class="loading">Loading election…</div></div>
{% endblock %}

{% block extra_js %}
<script>
  requireAuth();
  const user = getUser();
  const elId = window.location.pathname.split('/').filter(Boolean)[1];

  async function load() {
    try {
      const [eRes, pRes] = await Promise.all([
        apiGet('/elections/'),
        apiGet(`/elections/${elId}/posts/`),
      ]);

      const elections = eRes.ok ? await eRes.json() : [];
      const posts     = pRes.ok ? await pRes.json() : [];
      const election  = elections.find(e => String(e.id) === String(elId));

      if (!election) {
        document.getElementById('page-out').innerHTML =
          `<div class="empty-state"><p>Election not found.</p></div>`; return;
      }

      render(election, posts);
    } catch { showAlert('alert', 'Failed to load election.'); }
  }

  function render(el, posts) {
    const isAdmin = user?.role === 'admin';
    const isOwner = isAdmin && String(el.created_by) === String(user.user_id);

    document.getElementById('page-out').innerHTML = `

      <div class="flex-between page-hd">
        <div>
          <div class="flex items-center gap-1 mb-1">
            ${statusBadge(el.status)}
            <span class="text-xs text-muted">#${el.id}</span>
          </div>
          <h1 style="font-size:1.65rem;">${el.title}</h1>
          <p class="mt-1">${el.description || ''}</p>
        </div>
        <!-- View Results visible to everyone -->
        <a href="/elections-page/${el.id}/results/" class="btn btn-outline">View Results</a>
      </div>

      <div class="card mb-3" style="padding:1rem 1.4rem;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <div class="text-xs text-muted mb-1" style="text-transform:uppercase;letter-spacing:.05em;">Start</div>
            <div style="font-weight:500;">${formatDate(el.start_time)}</div>
          </div>
          <div>
            <div class="text-xs text-muted mb-1" style="text-transform:uppercase;letter-spacing:.05em;">End</div>
            <div style="font-weight:500;">${formatDate(el.end_time)}</div>
          </div>
        </div>
      </div>

      <!-- Admin controls (owner only) -->
      ${isOwner ? `
      <div class="admin-bar mb-3">
        <span class="admin-bar-label">Controls</span>
        <button class="btn btn-success btn-sm" id="btn-open"  ${el.status === 'opened' ? 'disabled' : ''}>Open</button>
        <button class="btn btn-danger  btn-sm" id="btn-close" ${el.status === 'closed' ? 'disabled' : ''}>Close</button>
        <button class="btn btn-warning btn-sm" id="btn-reset">Reset to Draft</button>
      </div>` : ''}

      <div class="flex-between mb-2">
        <h2 style="font-size:.95rem;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;">Available Posts</h2>
        <span class="text-xs text-muted">${posts.length} post${posts.length !== 1 ? 's' : ''}</span>
      </div>

      ${posts.length === 0
        ? `<div class="empty-state"><span class="empty-icon">📋</span><p>No posts added yet.</p></div>`
        : `<div class="grid-2">
            ${posts.map(p => `
              <a href="/elections-page/${el.id}/posts/${p.id}/" class="card card-link" style="text-decoration:none;">
                <div class="flex-between mb-1">
                  <div class="card-title">${p.title}</div>
                  <span class="badge badge-approved">${p.candidate_count} candidate${p.candidate_count !== 1 ? 's' : ''}</span>
                </div>
                ${p.description ? `<p class="text-sm mt-1">${p.description}</p>` : ''}
                <div class="hr"></div>
                <div class="text-sm text-accent">Click to view candidates →</div>
              </a>`).join('')}
          </div>`
      }
    `;

    bindAdmin(el);
  }

  function bindAdmin(el) {
    const act = async (endpoint, msg, btnId) => {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.disabled = true;
      try {
        const res  = await apiPost(endpoint, {});
        const data = await res.json();
        showAlert('alert', res.ok ? msg : (data.error || 'Action failed.'), res.ok ? 'success' : 'error');
        if (res.ok) setTimeout(load, 700);
      } catch { showAlert('alert', 'Network error.'); }
      finally { btn.disabled = false; }
    };
    document.getElementById('btn-open')?.addEventListener('click',  () => act(`/elections/${el.id}/open/`,  'Election is now open.',   'btn-open'));
    document.getElementById('btn-close')?.addEventListener('click', () => act(`/elections/${el.id}/close/`, 'Election closed.',         'btn-close'));
    document.getElementById('btn-reset')?.addEventListener('click', () => act(`/elections/${el.id}/reset/`, 'Election reset to draft.', 'btn-reset'));
  }

  load();
</script>
{% endblock %}
